services:
  invest-igator:
    image: docker.io/mrdeathrider/invest-igator:latest
    env_file:
      - .env
    environment:
      # Defaults to the internal `db` service; set DATABASE_URL in .env to point
      # at an external Postgres instead (that value wins over this default).
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-investigator}}
      AUTH_TRUST_HOST: "true"
      # Keep this true until all envs are properly set
      SKIP_ENV_VALIDATION: "1"
      # InfluxDB is EXTERNAL by default: INFLUXDB_URL comes from .env and points
      # to your own Influx instance, so do NOT override it here.
      # To run Influx *inside* this stack instead, uncomment the `influxdb`
      # service (and its volume) at the bottom of this file and set
      # INFLUXDB_URL=http://influxdb:8086 in your .env.
      # Ofelia will exec the ingest inside this container on a cron schedule
    labels:
      ofelia.enabled: "true"
      # Run daily at 02:15 UTC (same as previous GH Actions cron)
      ofelia.job-exec.ingest-yahoo.schedule: 15 2 * * *
      ofelia.job-exec.ingest-yahoo.command: bun run src/server/jobs/ingest-yahoo.ts
      ofelia.job-exec.ingest-yahoo.no-overlap: "true"
      # Run FX ingest twice daily at 06:00 and 18:00 UTC
      ofelia.job-exec.ingest-fx.schedule: 0 6,18 * * *
      ofelia.job-exec.ingest-fx.command: bun run src/server/jobs/ingest-fx.ts
      ofelia.job-exec.ingest-fx.no-overlap: "true"
    ports:
      - 3311:3000
    depends_on:
      db:
        condition: service_healthy
      # Uncomment if you enable the internal influxdb service below:
      # influxdb:
      #   condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - bun -e "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks: [internal]
    restart: unless-stopped
  # Internal Postgres (keep if you don't already have an external DB)
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-investigator}
    volumes:
      # Named volume (portable). To use a host bind mount instead, replace with:
      #   - /docker-containers/invest-igator/pgdata:/var/lib/postgresql/data
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-investigator}
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [internal]
    restart: unless-stopped
  # Scheduler service to run jobs inside containers using labels above
  scheduler:
    image: mcuadros/ofelia:latest
    command: daemon --docker
    depends_on:
      invest-igator:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [internal]
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # OPTIONAL: internal InfluxDB 2.x (self-contained stack).
  # By default Influx is EXTERNAL — leave this commented and point INFLUXDB_URL
  # in .env at your own instance. To run Influx inside this stack instead:
  #   1. Uncomment this service and the `influxdb` volume at the bottom.
  #   2. Uncomment the influxdb `depends_on` block under `invest-igator`.
  #   3. Set INFLUXDB_URL=http://influxdb:8086 in your .env.
  # The INFLUXDB_ORG / INFLUXDB_BUCKET / INFLUXDB_TOKEN below reuse the same
  # values the app reads from .env, so first-run auto-setup matches the app.
  # ---------------------------------------------------------------------------
  # influxdb:
  #   image: influxdb:2
  #   environment:
  #     DOCKER_INFLUXDB_INIT_MODE: setup
  #     DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USERNAME:-admin}
  #     DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD:-changeme-please}
  #     DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-local-org}
  #     DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-daily}
  #     DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN:-local-secret-token}
  #   volumes:
  #     - influxdb:/var/lib/influxdb2
  #   healthcheck:
  #     test: ["CMD", "influx", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   networks: [internal]
  #   restart: unless-stopped

volumes:
  pgdata:
  # Uncomment when using the internal influxdb service above:
  # influxdb:

networks:
  internal:
    driver: bridge

x-dockge:
  urls:
    - https://invest-igator.karaliolios.dev
